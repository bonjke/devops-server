<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Management - DevOps Center</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .jira-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-button { padding: 10px 20px; background: #0052cc; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .tab-button.active { background: #0747a6; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 10px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        textarea { min-height: 100px; }
        button[type="submit"] { background: #0052cc; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button[type="submit"]:hover { background: #0747a6; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .result.show { display: block; }
        .result.success { background: #d4edda; border: 1px solid #c3e6cb; }
        .result.error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .result pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="jira-container">
        <header>
            <h1>🎫 Jira Management</h1>
            <p><a href="index.html">← Back to Main</a></p>
        </header>

        <div class="tab-buttons">
            <button class="tab-button active" onclick="switchTab('create', this)">Create Issue</button>
            <button class="tab-button" onclick="switchTab('transition', this)">Change Status</button>
            <button class="tab-button" onclick="switchTab('comment', this)">Add Comment</button>
            <button class="tab-button" onclick="switchTab('search', this)">Search</button>
        </div>

        <div id="create" class="tab-content active">
            <h2>Create New Issue</h2>
            <form id="create-form">
                <div class="form-group"><label>Project Key *</label><input type="text" name="project_key" placeholder="SCRUM" value="SCRUM" required></div>
                <div class="form-group"><label>Summary *</label><input type="text" name="summary" placeholder="Brief description" required></div>
                <div class="form-group"><label>Description *</label><textarea name="description" required></textarea></div>
                <div class="form-group"><label>Issue Type</label>
                    <select name="issue_type"><option value="Task">Task</option><option value="Bug">Bug</option><option value="Story">Story</option><option value="Epic">Epic</option></select>
                </div>
                <div class="form-group"><label>Priority</label>
                    <select name="priority"><option value="">None</option><option value="Highest">Highest</option><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option><option value="Lowest">Lowest</option></select>
                </div>
                <button type="submit">Create Issue</button>
            </form>
            <div id="create-result" class="result"></div>
        </div>

        <div id="transition" class="tab-content">
            <h2>Change Issue Status</h2>
            <form id="transition-form">
                <div class="form-group"><label>Issue Key *</label><input type="text" name="issue_key" placeholder="SCRUM-1" required></div>
                <div class="form-group"><label>New Status *</label>
                    <select name="transition" required><option value="">Select status...</option><option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="In Review">In Review</option><option value="Done">Done</option></select>
                </div>
                <button type="submit">Change Status</button>
            </form>
            <div id="transition-result" class="result"></div>
        </div>

        <div id="comment" class="tab-content">
            <h2>Add Comment</h2>
            <form id="comment-form">
                <div class="form-group"><label>Issue Key *</label><input type="text" name="issue_key" placeholder="SCRUM-1" required></div>
                <div class="form-group"><label>Comment *</label><textarea name="comment" required></textarea></div>
                <button type="submit">Add Comment</button>
            </form>
            <div id="comment-result" class="result"></div>
        </div>

        <div id="search" class="tab-content">
            <h2>Search Issues</h2>
            <form id="search-form">
                <div class="form-group"><label>JQL Query *</label><textarea name="jql" placeholder='project = "SCRUM"' required></textarea></div>
                <button type="submit">Search</button>
            </form>
            <div id="search-result" class="result"></div>
        </div>
    </div>

    <script>
        // ===== API KEY =====
        function getApiKey() {
            let key = sessionStorage.getItem('devops_api_key');
            if (!key) {
                key = prompt('🔑 Enter API Key:', '');
                if (key) sessionStorage.setItem('devops_api_key', key);
            }
            return key;
        }

        function apiFetch(url, options = {}) {
            const key = getApiKey();
            if (!key) throw new Error('No API key');
            options.headers = { 'X-API-Key': key, 'Content-Type': 'application/json', ...options.headers };
            return fetch(url, options).then(r => {
                if (r.status === 403) { sessionStorage.removeItem('devops_api_key'); throw new Error('Invalid API key — reload and try again'); }
                return r;
            });
        }

        // ===== TABS =====
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            btn.classList.add('active');
        }

        // ===== TASK SUBMIT WITH POLLING =====
        async function submitTask(action, params, resultId) {
            const resultEl = document.getElementById(resultId);
            resultEl.innerHTML = '⏳ Processing...';
            resultEl.className = 'result show';

            const taskId = `jira-${action}-${Date.now()}`;
            const task = { task_id: taskId, action: `jira_${action}`, params };

            try {
                const resp = await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify(task) });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                // Poll for result
                for (let i = 0; i < 15; i++) {
                    await new Promise(r => setTimeout(r, 1500));
                    const r = await apiFetch(`/api/tasks/${taskId}`);
                    if (!r.ok) continue;
                    const result = await r.json();

                    if (result.status === 'completed') {
                        resultEl.className = 'result show success';
                        resultEl.innerHTML = `<h3>✅ Success!</h3><pre>${JSON.stringify(result.result, null, 2)}</pre>`;
                        return;
                    }
                    if (result.status === 'failed') {
                        resultEl.className = 'result show error';
                        resultEl.innerHTML = `<h3>❌ Error</h3><p>${result.error}</p>`;
                        return;
                    }
                }
                resultEl.innerHTML = `<h3>⏳ Still processing...</h3><p>Task ID: ${taskId}</p>`;
            } catch (e) {
                resultEl.className = 'result show error';
                resultEl.innerHTML = `<h3>❌ Error</h3><p>${e.message}</p>`;
            }
        }

        // ===== FORM HANDLERS =====
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = new FormData(e.target);
            const params = { project_key: f.get('project_key'), summary: f.get('summary'), description: f.get('description'), issue_type: f.get('issue_type') };
            if (f.get('priority')) params.priority = f.get('priority');
            await submitTask('create_issue', params, 'create-result');
        });

        document.getElementById('transition-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = new FormData(e.target);
            await submitTask('transition_issue', { issue_key: f.get('issue_key'), transition: f.get('transition') }, 'transition-result');
        });

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = new FormData(e.target);
            await submitTask('add_comment', { issue_key: f.get('issue_key'), comment: f.get('comment') }, 'comment-result');
        });

        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = new FormData(e.target);
            await submitTask('search', { jql: f.get('jql'), max_results: 20 }, 'search-result');
        });
    </script>
</body>
</html>
