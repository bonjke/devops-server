<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Management - DevOps Center</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .jira-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            padding: 10px 20px;
            background: #0052cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .tab-button.active {
            background: #0747a6;
        }
        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        textarea {
            min-height: 100px;
        }
        button[type="submit"] {
            background: #0052cc;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button[type="submit"]:hover {
            background: #0747a6;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .result pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="jira-container">
        <header>
            <h1>🎫 Jira Management</h1>
            <p><a href="index.html">← Back to Main</a></p>
        </header>

        <div class="tab-buttons">
            <button class="tab-button active" onclick="switchTab('create')">Create Issue</button>
            <button class="tab-button" onclick="switchTab('transition')">Change Status</button>
            <button class="tab-button" onclick="switchTab('comment')">Add Comment</button>
            <button class="tab-button" onclick="switchTab('search')">Search</button>
        </div>

        <!-- Create Issue -->
        <div id="create" class="tab-content active">
            <h2>Create New Issue</h2>
            <form id="create-form">
                <div class="form-group">
                    <label>Project Key *</label>
                    <input type="text" name="project_key" placeholder="e.g., PROJ" required>
                </div>
                <div class="form-group">
                    <label>Summary *</label>
                    <input type="text" name="summary" placeholder="Brief description" required>
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea name="description" required></textarea>
                </div>
                <div class="form-group">
                    <label>Issue Type</label>
                    <select name="issue_type">
                        <option value="Task">Task</option>
                        <option value="Bug">Bug</option>
                        <option value="Story">Story</option>
                        <option value="Epic">Epic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="">None</option>
                        <option value="Highest">Highest</option>
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                        <option value="Lowest">Lowest</option>
                    </select>
                </div>
                <button type="submit">Create Issue</button>
            </form>
            <div id="create-result" class="result"></div>
        </div>

        <!-- Change Status -->
        <div id="transition" class="tab-content">
            <h2>Change Issue Status</h2>
            <form id="transition-form">
                <div class="form-group">
                    <label>Issue Key *</label>
                    <input type="text" name="issue_key" placeholder="e.g., PROJ-123" required>
                </div>
                <div class="form-group">
                    <label>New Status *</label>
                    <select name="transition" required>
                        <option value="">Select status...</option>
                        <option value="To Do">To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <button type="submit">Change Status</button>
            </form>
            <div id="transition-result" class="result"></div>
        </div>

        <!-- Add Comment -->
        <div id="comment" class="tab-content">
            <h2>Add Comment</h2>
            <form id="comment-form">
                <div class="form-group">
                    <label>Issue Key *</label>
                    <input type="text" name="issue_key" placeholder="e.g., PROJ-123" required>
                </div>
                <div class="form-group">
                    <label>Comment *</label>
                    <textarea name="comment" required></textarea>
                </div>
                <button type="submit">Add Comment</button>
            </form>
            <div id="comment-result" class="result"></div>
        </div>

        <!-- Search -->
        <div id="search" class="tab-content">
            <h2>Search Issues</h2>
            <form id="search-form">
                <div class="form-group">
                    <label>JQL Query *</label>
                    <textarea name="jql" placeholder="e.g., project = PROJ AND status = 'In Progress'" required></textarea>
                </div>
                <button type="submit">Search</button>
            </form>
            <div id="search-result" class="result"></div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function submitTask(action, params, resultId) {
            const resultEl = document.getElementById(resultId);
            resultEl.textContent = 'Processing...';
            resultEl.className = 'result show';
            
            const task = {
                task_id: `jira-${action}-${Date.now()}`,
                action: `jira_${action}`,
                params: params
            };
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task)
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const resultResponse = await fetch(`/api/tasks/${task.task_id}`);
                const result = await resultResponse.json();
                
                if (result.status === 'completed') {
                    resultEl.className = 'result show success';
                    resultEl.innerHTML = `<h3>✅ Success!</h3><pre>${JSON.stringify(result.result, null, 2)}</pre>`;
                } else if (result.status === 'failed') {
                    resultEl.className = 'result show error';
                    resultEl.innerHTML = `<h3>❌ Error</h3><p>${result.error}</p>`;
                } else {
                    resultEl.className = 'result show';
                    resultEl.innerHTML = `<h3>⏳ Processing...</h3><p>Check results/${task.task_id}.json</p>`;
                }
            } catch (error) {
                resultEl.className = 'result show error';
                resultEl.innerHTML = `<h3>❌ Error</h3><p>${error.message}</p>`;
            }
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const params = {
                project_key: formData.get('project_key'),
                summary: formData.get('summary'),
                description: formData.get('description'),
                issue_type: formData.get('issue_type'),
            };
            if (formData.get('priority')) params.priority = formData.get('priority');
            await submitTask('create_issue', params, 'create-result');
        });

        document.getElementById('transition-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await submitTask('transition_issue', {
                issue_key: formData.get('issue_key'),
                transition: formData.get('transition'),
            }, 'transition-result');
        });

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await submitTask('add_comment', {
                issue_key: formData.get('issue_key'),
                comment: formData.get('comment'),
            }, 'comment-result');
        });

        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await submitTask('search', {
                jql: formData.get('jql'),
                max_results: 10
            }, 'search-result');
        });
    </script>
</body>
</html>
