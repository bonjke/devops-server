services:
  devops-center:
    build: .
    container_name: devops-center
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tasks:/app/tasks
      - ./results:/app/results
      - ./logs:/app/logs
      - ./src:/app/src
      - ./ui:/app/ui
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - devops-net
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - API_KEY=devops-2match-secret-2026
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  devops-net:
    driver: bridge
